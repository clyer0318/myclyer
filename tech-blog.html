<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Blog | 我的技術部落格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151932;
            --bg-card: #1a1f3a;
            --accent-cyan: #00f5ff;
            --accent-green: #00ff88;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --border: rgba(0, 245, 255, 0.2);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 背景動畫網格 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* 發光效果 */
        .glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.1), transparent 70%);
            pointer-events: none;
            z-index: 1;
            filter: blur(40px);
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 頂部導航 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 60px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: '>';
            color: var(--accent-cyan);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s;
            position: relative;
            padding: 5px 0;
        }

        nav a:hover {
            color: var(--accent-cyan);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-cyan);
            transition: width 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* 訪客統計 */
        .visitor-stats {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .visitor-count {
            color: var(--accent-cyan);
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        /* Hero 區域 */
        .hero {
            text-align: center;
            padding: 60px 0;
            margin-bottom: 80px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* 統計儀表板 */
        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 5px 25px rgba(0, 245, 255, 0.2);
        }

        .stat-card .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-cyan);
            font-family: 'Courier New', monospace;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 搜尋和篩選 */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.2);
        }

        .tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tag:hover, .tag.active {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
        }

        /* 文章卡片 */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-green));
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .post-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 40px rgba(0, 245, 255, 0.2);
        }

        .post-card:hover::before {
            transform: scaleX(1);
        }

        .post-meta {
            display: flex;
            gap: 15px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .views-count {
            color: var(--accent-green);
        }

        .post-card h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .post-card p {
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .post-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .post-tag {
            padding: 4px 12px;
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 12px;
            font-size: 12px;
            color: var(--accent-cyan);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
        }

        /* 載入動畫 */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }

            .posts-grid {
                grid-template-columns: 1fr;
            }

            nav {
                gap: 15px;
                flex-wrap: wrap;
            }

            .controls {
                flex-direction: column;
            }

            .stats-dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow" style="top: 10%; left: 10%;"></div>
    <div class="glow" style="top: 60%; right: 10%;"></div>

    <div class="container">
        <header>
            <div class="logo">TECH.BLOG</div>
            <nav>
                <a href="#home">首頁</a>
                <a href="#about">關於</a>
                <a href="#archive">文章</a>
                <a href="#contact">聯絡</a>
                <div class="visitor-stats">
                    <span>👁️</span>
                    <span class="visitor-count" id="visitorCount">
                        <span class="loading"></span>
                    </span>
                </div>
            </nav>
        </header>

        <div class="hero">
            <h1>技術探索之旅</h1>
            <p>分享程式開發、系統架構與技術心得</p>
        </div>

        <!-- 統計儀表板 -->
        <div class="stats-dashboard">
            <div class="stat-card">
                <div class="icon">📊</div>
                <div class="number" id="totalViews">
                    <span class="loading"></span>
                </div>
                <div class="label">總瀏覽量</div>
            </div>
            <div class="stat-card">
                <div class="icon">📝</div>
                <div class="number">6</div>
                <div class="label">文章數量</div>
            </div>
            <div class="stat-card">
                <div class="icon">🏷️</div>
                <div class="number">5</div>
                <div class="label">標籤分類</div>
            </div>
            <div class="stat-card">
                <div class="icon">🔥</div>
                <div class="number" id="todayViews">
                    <span class="loading"></span>
                </div>
                <div class="label">今日瀏覽</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜尋文章...">
            </div>
            <div class="tags">
                <span class="tag active" data-tag="all">全部</span>
                <span class="tag" data-tag="JavaScript">JavaScript</span>
                <span class="tag" data-tag="Python">Python</span>
                <span class="tag" data-tag="Web">Web 開發</span>
                <span class="tag" data-tag="DevOps">DevOps</span>
            </div>
        </div>

        <div class="posts-grid" id="postsGrid">
            <!-- 文章會由 JavaScript 動態生成 -->
        </div>

        <footer>
            <p>© 2025 Tech Blog. Built with ❤️ and GitHub Pages</p>
        </footer>
    </div>

    <script>
        // 示範文章資料
        const posts = [
            {
                id: 1,
                title: "深入理解 JavaScript 閉包",
                excerpt: "閉包是 JavaScript 中最重要的概念之一。本文將深入探討閉包的原理、應用場景以及常見陷阱。",
                date: "2025-10-28",
                tags: ["JavaScript", "Web"],
                readTime: "8 分鐘",
                views: 1234
            },
            {
                id: 2,
                title: "Docker 容器化實戰指南",
                excerpt: "從零開始學習 Docker,了解容器化技術如何改變現代應用部署的方式。",
                date: "2025-10-25",
                tags: ["DevOps", "Docker"],
                readTime: "12 分鐘",
                views: 856
            },
            {
                id: 3,
                title: "Python 異步編程完全指南",
                excerpt: "探索 Python 的 asyncio 框架,學習如何寫出高效能的異步程式碼。",
                date: "2025-10-22",
                tags: ["Python"],
                readTime: "10 分鐘",
                views: 1089
            },
            {
                id: 4,
                title: "RESTful API 設計最佳實踐",
                excerpt: "設計優雅、易用的 API 是後端開發的核心技能。本文分享 RESTful API 的設計原則與實踐經驗。",
                date: "2025-10-20",
                tags: ["Web", "API"],
                readTime: "15 分鐘",
                views: 2341
            },
            {
                id: 5,
                title: "Git 進階技巧與工作流程",
                excerpt: "掌握 Git 的進階功能,提升團隊協作效率。包含 rebase、cherry-pick 等實用技巧。",
                date: "2025-10-18",
                tags: ["DevOps", "Git"],
                readTime: "7 分鐘",
                views: 678
            },
            {
                id: 6,
                title: "前端效能優化實戰",
                excerpt: "從載入速度、渲染效能到記憶體管理,全面提升你的網站效能。",
                date: "2025-10-15",
                tags: ["JavaScript", "Web"],
                readTime: "11 分鐘",
                views: 1456
            }
        ];

        let currentTag = 'all';
        let searchTerm = '';

        // 訪客統計功能
        async function initVisitorStats() {
            try {
                // 嘗試從 storage 讀取訪客資料
                const statsResult = await window.storage.get('blog-stats');
                let stats = statsResult ? JSON.parse(statsResult.value) : {
                    totalViews: 0,
                    todayViews: 0,
                    lastVisit: null,
                    uniqueVisitors: 0
                };

                // 檢查是否是新的一天
                const today = new Date().toDateString();
                if (stats.lastVisit !== today) {
                    stats.todayViews = 0;
                    stats.lastVisit = today;
                }

                // 增加訪問次數
                stats.totalViews++;
                stats.todayViews++;
                stats.uniqueVisitors++;

                // 儲存更新後的統計
                await window.storage.set('blog-stats', JSON.stringify(stats));

                // 更新顯示
                updateStatsDisplay(stats);
            } catch (error) {
                console.log('無法載入訪客統計:', error);
                // 使用模擬資料
                const mockStats = {
                    totalViews: Math.floor(Math.random() * 10000) + 5000,
                    todayViews: Math.floor(Math.random() * 100) + 20,
                    uniqueVisitors: Math.floor(Math.random() * 1000) + 500
                };
                updateStatsDisplay(mockStats);
            }
        }

        function updateStatsDisplay(stats) {
            document.getElementById('visitorCount').textContent = stats.uniqueVisitors.toLocaleString();
            document.getElementById('totalViews').textContent = stats.totalViews.toLocaleString();
            document.getElementById('todayViews').textContent = stats.todayViews.toLocaleString();
        }

        // 渲染文章
        function renderPosts() {
            const postsGrid = document.getElementById('postsGrid');
            const filteredPosts = posts.filter(post => {
                const matchesTag = currentTag === 'all' || post.tags.includes(currentTag);
                const matchesSearch = post.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                    post.excerpt.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesTag && matchesSearch;
            });

            postsGrid.innerHTML = filteredPosts.map(post => `
                <div class="post-card" onclick="openPost(${post.id})">
                    <div class="post-meta">
                        <span>📅 ${post.date}</span>
                        <span>⏱️ ${post.readTime}</span>
                        <span class="views-count">👁️ ${post.views.toLocaleString()}</span>
                    </div>
                    <h2>${post.title}</h2>
                    <p>${post.excerpt}</p>
                    <div class="post-tags">
                        ${post.tags.map(tag => `<span class="post-tag">#${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 標籤篩選
        document.querySelectorAll('.tag').forEach(tag => {
            tag.addEventListener('click', function() {
                document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentTag = this.dataset.tag;
                renderPosts();
            });
        });

        // 搜尋功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            searchTerm = e.target.value;
            renderPosts();
        });

        // 開啟文章
        async function openPost(id) {
            // 增加文章瀏覽次數
            const post = posts.find(p => p.id === id);
            if (post) {
                post.views++;
                renderPosts();
            }
            alert(`開啟文章 ID: ${id}\n\n在實際網站中，這會導航到文章詳細頁面。`);
        }

        // 初始化
        initVisitorStats();
        renderPosts();
    </script>
</body>
</html>
